[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = true
fs_permissions = [
    {access = "read-write", path = "../web/.env"},
    {access = "read-write", path = "../web/.env.example"},
    {access = "read-write", path = "../.env"},
    {access = "read-write", path = "../.env.example"},
    {access = "read-write", path = "./.vessel-state.json"}
]

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
